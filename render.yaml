services:
  # Backend API Service
  - type: web
    name: melody-maker-api
    runtime: node
    plan: free
    env: node
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # You'll set this in Render dashboard
      - key: JWT_SECRET
        sync: false # You'll set this in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false # You'll set this in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false # You'll set this in Render dashboard
      - key: FRONTEND_URL
        value: https://your-app-name.onrender.com

  # Frontend Service
  - type: web
    name: melody-maker-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://melody-maker-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
